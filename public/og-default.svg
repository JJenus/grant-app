<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#2d5a40"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="280" fill="#4a7c59" opacity="0.12"/>
  <circle cx="150" cy="530" r="200" fill="#a8d5b5" opacity="0.06"/>
  <!-- Gold accent line -->
  <rect x="80" y="290" width="3" height="120" fill="#c9a84c" opacity="0.8"/>
  <!-- Logo mark -->
  <circle cx="80" cy="100" r="32" fill="#ffffff" opacity="0.12"/>
  <text x="80" y="108" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">G</text>
  <!-- Site name -->
  <text x="126" y="108" font-family="Georgia, serif" font-size="28" fill="white" opacity="0.9">GrantPortal</text>
  <!-- Main headline -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white">Funding</text>
  <text x="80" y="320" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#a8d5b5" font-style="italic">Ideas</text>
  <text x="80" y="400" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white">That Matter</text>
  <!-- Description -->
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="24" fill="#a8d5b5" opacity="0.85">Grants for community development, education, environment,</text>
  <text x="80" y="492" font-family="Arial, sans-serif" font-size="24" fill="#a8d5b5" opacity="0.85">health, arts, and economic opportunity.</text>
  <!-- CTA pill -->
  <rect x="80" y="535" width="220" height="48" rx="24" fill="#c9a84c"/>
  <text x="190" y="565" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a2a" text-anchor="middle">Apply Now →</text>
</svg>